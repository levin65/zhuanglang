      </div>
    </div>
  </section>

      </button>

            <i class="fa fa-angle-left"></i>
          </button>
          
          <button id="next-image" class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-black bg-opacity-50 hover:bg-opacity-70 text-white text-2xl w-10 h-10 rounded-full flex items-center justify-center transition-colors">
            <i class="fa fa-angle-right"></i>
          </button>
        </div>
        
        <div class="mt-4 text-white">

          <p id="viewer-description" class="text-gray-300"></p>

          </div>
        </div>
      </div>
    </div>
  </div>

        "http://photogzmaz.photo.store.qq.com/psc?/V52glOT24AFHNr2eahEb1depUX36KfZi/TmEUgtj9EK6.7V8ajmQrECsVRLTkL20FA3hXq1SyBoAhGUfbntoAPph8QAtBZXP6jiBag3q3r3sAjd6BXUt.gny1m*td1XEyvXxmjQSErSY!/b&bo=*wT4BvgG*wQBKQ4!&rf=viewer_4",
        "http://photogzmaz.photo.store.qq.com/psc?/V52glOT24AFHNr2eahEb1depUX36KfZi/TmEUgtj9EK6.7V8ajmQrECsVRLTkL20FA3hXq1SyBoADLNcywWZtY5CR*pxvThSNdjwZ1ZxvRU5mPAO6jlQ8A30qm.T72KYLWOw395bocVE!/b&bo=AAX9Bv0GAAUBKQ4!&rf=viewer_4",
        "http://photogzmaz.photo.store.qq.com/psc?/V52glOT24AFHNr2eahEb1depUX36KfZi/TmEUgtj9EK6.7V8ajmQrECsVRLTkL20FA3hXq1SyBoA0SmtBI4rrSeLizLgTrO1FiG5YwfAGd1V0imWFVJ030B3NSaVYegqaJx9L9bafZ1Q!/b&bo=AAXyBvIGAAUBKQ4!&rf=viewer_4",
      ];

      // 基于URL数组生成photoData
      const photoData = photoUrls.map((url, i) => {
       const num = (i + 1).toString().padStart(2, '0');
        return {
        id: i + 1,
        src: url, // 关键：改为src（原代码是Image，会导致图片不显示）
        title: `南开×庄浪 ${num}`,
        description: `与日新小学的小朋友们的共创活动成果 - 第${num}张`
      };
    });
      
      // 当前查看的照片索引
      let currentPhotoIndex = 0;
      
      // 渲染照片网格
      const photoGrid = document.getElementById('photo-grid');
      function renderPhotos(photos) {
        photos.forEach((photo, index) => {
          const photoElement = document.createElement('div');
          photoElement.className = 'masonry-item';
          photoElement.setAttribute('data-aos', 'fade-up');
          photoElement.setAttribute('data-aos-delay', (index % 6) * 100);
          
          photoElement.innerHTML = `
            <div class="relative overflow-hidden rounded-lg shadow-md group cursor-pointer">
              <!-- 修复：显示真实图片，替换占位符 -->
              <img src="${photo.src}" alt="${photo.title}" class="w-full h-64 object-cover">
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end">
                <div class="p-4 text-white">
                  <h3 class="font-bold">${photo.title}</h3>
                  <p class="text-sm">${photo.description.substring(0, 30)}...</p>
                </div>
              </div>
            </div>
          `;
          
          // 点击照片查看大图
          photoElement.addEventListener('click', function() {
            openPhotoViewer(index);
          });
          
          photoGrid.appendChild(photoElement);
        });
        
        // 刷新AOS动画
        AOS.refresh();
      }
      
      // 初始渲染前20张照片
      renderPhotos(photoData.slice(0, 20));
      
      // 加载更多按钮
      const loadMoreBtn = document.getElementById('load-more');
      let loadedCount = 20;
      
      loadMoreBtn.addEventListener('click', function() {
        if (loadedCount >= photoData.length) {
          this.innerHTML = '<i class="fa fa-check mr-2"></i> 已加载全部照片';
          this.disabled = true;
          this.classList.add('bg-gray-500');
          this.classList.remove('bg-primary', 'hover:bg-primary/90');
          return;
        }
        
        // 加载下一批照片（每次加载10张）
        const nextBatch = photoData.slice(loadedCount, loadedCount + 10);
        renderPhotos(nextBatch);
        loadedCount += nextBatch.length;
        
        // 更新按钮状态
        if (loadedCount >= photoData.length) {
          this.innerHTML = '<i class="fa fa-check mr-2"></i> 已加载全部照片';
          this.disabled = true;
          this.classList.add('bg-gray-500');
          this.classList.remove('bg-primary', 'hover:bg-primary/90');
        }
      });
      
      // 照片查看器相关元素
      const photoViewer = document.getElementById('photo-viewer');
      const viewerImage = document.getElementById('viewer-image');
      const viewerTitle = document.getElementById('viewer-title');
      const viewerDescription = document.getElementById('viewer-description');
      const viewerCounter = document.getElementById('viewer-counter');
      const closeViewer = document.getElementById('close-viewer');
      const prevImage = document.getElementById('prev-image');
      const nextImage = document.getElementById('next-image');
      const viewerDownload = document.getElementById('viewer-download');
      const viewerShare = document.getElementById('viewer-share');
      
      // 打开照片查看器
      function openPhotoViewer(index) {
        currentPhotoIndex = index;
        const photo = photoData[index];
        
        viewerImage.src = photo.src;
        viewerTitle.textContent = photo.title;
        viewerDescription.textContent = photo.description;
        viewerCounter.textContent = `${index + 1} / ${photoData.length}`;
        
        photoViewer.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }
      
      // 关闭照片查看器
      closeViewer.addEventListener('click', function() {
        photoViewer.classList.add('hidden');
        document.body.style.overflow = 'auto';
      });
      
      // 上一张照片
      prevImage.addEventListener('click', function() {
        currentPhotoIndex = (currentPhotoIndex - 1 + photoData.length) % photoData.length;
        updateViewer();
      });
      
      // 下一张照片
      nextImage.addEventListener('click', function() {
        currentPhotoIndex = (currentPhotoIndex + 1) % photoData.length;
        updateViewer();
      });
      
      // 更新照片查看器内容
      function updateViewer() {
        const photo = photoData[currentPhotoIndex];
        
        viewerImage.src = photo.src;
        viewerTitle.textContent = photo.title;
        viewerDescription.textContent = photo.description;
        viewerCounter.textContent = `${currentPhotoIndex + 1} / ${photoData.length}`;
      }
      
      // 下载和分享功能
      viewerDownload.addEventListener('click', function() {
        alert(`下载 ${photoData[currentPhotoIndex].title}`);
      });
      
      viewerShare.addEventListener('click', function() {
        alert(`分享 ${photoData[currentPhotoIndex].title}`);
      });
      
      // 键盘导航
      document.addEventListener('keydown', function(e) {
        if (photoViewer.classList.contains('hidden')) return;
        
        if (e.key === 'Escape') {
          photoViewer.classList.add('hidden');
          document.body.style.overflow = 'auto';
        } else if (e.key === 'ArrowLeft') {
          prevImage.click();
        } else if (e.key === 'ArrowRight') {
          nextImage.click();
        }
      });
      
      // 点击空白区域关闭查看器
      photoViewer.addEventListener('click', function(e) {
        if (e.target === photoViewer) {
          photoViewer.classList.add('hidden');
          document.body.style.overflow = 'auto';
        }
      });
      
      // 返回顶部按钮
      const backToTop = document.getElementById('back-to-top');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 300) {
          backToTop.classList.remove('opacity-0', 'invisible');
          backToTop.classList.add('opacity-100', 'visible');
        } else {
          backToTop.classList.add('opacity-0', 'invisible');
          backToTop.classList.remove('opacity-100', 'visible');
        }
      });
      
      backToTop.addEventListener('click', function() {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });
    });
  </script>
